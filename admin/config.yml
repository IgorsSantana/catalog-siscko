backend:
  name: git-gateway
  branch: main

# Traduzir a interface para Português
locale: 'pt'

# Logo da marca no topo do painel
logo_url: '/logo-white.png'

# Os uploads feitos pelo painel vão para a pasta /uploads
media_folder: "uploads"
public_folder: "uploads"

# Ocultar o preview lado-a-lado já que nosso site usa layout customizado
editor:
  preview: false

collections:
  - name: "catalog"
    label: "Catálogo de Roupas"
    files:
      - label: "Gerenciar Produtos"
        name: "products"
        file: "data/products.json"
        description: "Adicione, remova e edite as peças do catálogo. Não esqueça de clicar em PUBLISH ao finalizar."
        fields:
          - label: "Lista de Produtos"
            name: "products"
            widget: "list"
            summary: '{{fields.name}} | {{fields.status}} | R$ {{fields.price}}'
            fields:
              - label: "Nome da Peça"
                name: "name"
                widget: "string"
                hint: "Ex: Moletom Chumbo, Basic Tee..."
              - label: "Preço (R$)"
                name: "price"
                widget: "number"
                value_type: "float"
                default: 0
                required: false
                hint: "Use ponto para centavos. Ex: 99.90. Deixe 0 se for lançamento futuro."
              - label: "Disponibilidade"
                name: "status"
                widget: "select"
                options: ["Disponível", "Em Breve"]
                default: "Disponível"
                hint: "Peças em breve ficarão com botão desativado e preço oculto."
              - label: "Sessão do Site"
                name: "category"
                widget: "select"
                options: ["CLUB-01", "EM BREVE"]
                default: "CLUB-01"
                hint: "Em qual seção da página inicial esta peça deve aparecer?"
              - label: "Galeria de Fotos"
                name: "images"
                widget: "list"
                summary: 'Foto {{index}}'
                hint: "A 1ª foto é a padrão. A 2ª foto é a que aparece quando o cliente passa o mouse por cima (Hover/Costas)."
                field: 
                  label: "Upload da Imagem"
                  name: "image"
                  widget: "image"
