backend:
  name: git-gateway
  branch: main

# Traduzir a interface para Português
locale: 'pt'

# Logo da marca no topo do painel
logo_url: '/logo-white.png'

# Os uploads feitos pelo painel vão para a pasta /uploads
media_folder: "uploads"
public_folder: "uploads"

# Ocultar o preview lado-a-lado já que nosso site usa layout customizado
editor:
  preview: false

collections:
  - name: "catalog"
    label: "Catálogo de Roupas"
    files:
      - label: "Gerenciar Produtos"
        name: "products"
        file: "data/products.json"
        description: "Adicione, remova e edite as peças do catálogo. Não esqueça de clicar em PUBLISH ao finalizar."
        fields:
          - label: "Lista de Produtos"
            name: "products"
            widget: "list"
            summary: '👕 {{fields.name}} | {{fields.status}} | R$ {{fields.price}}'
            fields:
              - label: "1. Exibir no Site?"
                name: "is_active"
                widget: "boolean"
                default: true
                required: false
                hint: "Desligue essa chavinha para ocultar a peça do site sem precisar apagar ela."
              - label: "2. Nome da Peça"
                name: "name"
                widget: "string"
                hint: "Ex: Moletom Chumbo, Basic Tee..."
              - label: "3. Preço (R$)"
                name: "price"
                widget: "number"
                value_type: "float"
                default: 0
                required: false
                hint: "Use ponto para centavos. Ex: 99.90. Deixe 0 se for lançamento futuro."
              - label: "4. Disponibilidade"
                name: "status"
                widget: "select"
                options: ["Disponível", "Em Breve"]
                default: "Disponível"
                hint: "Peças em breve ficarão com botão desativado e preço oculto."
              - label: "5. Sessão do Site"
                name: "category"
                widget: "select"
                options: ["CLUB-01", "EM BREVE"]
                default: "CLUB-01"
                hint: "Em qual seção da página inicial esta peça deve aparecer?"
              - label: "6. Foto Principal (Capa/Vitrine)"
                name: "main_image"
                widget: "image"
                required: false
                hint: "A foto principal do produto. Geralmente é a foto das COSTAS."
              - label: "7. Foto Secundária (Hover/Frente)"
                name: "hover_image"
                widget: "image"
                required: false
                hint: "A foto que aparece ao passar o mouse. Geralmente é a FRENTE."
              - label: "8. Galeria de Fotos Extras (Opcional)"
                name: "extra_images"
                widget: "list"
                required: false
                collapsed: false
                minimize_collapsed: true
                summary: '📸 Foto Extra {{index}}'
                hint: "Adicione mais fotos para os detalhes da peça."
                field: 
                  label: "Upload da Imagem"
                  name: "image"
                  widget: "image"
  - name: "settings"
    label: "Configurações do Site"
    files:
      - label: "Banners da Página Inicial"
        name: "banners"
        file: "data/settings.json"
        description: "Altere os banners principais do site."
        fields:
          - label: "Banners Desktop (Carrossel)"
            name: "desktop_banners"
            widget: "list"
            hint: "Banners que aparecem no computador. Tamanho recomendado: 1920x800 px."
            field:
              label: "Upload da Imagem"
              name: "image"
              widget: "image"
          - label: "Banner Mobile (Celular)"
            name: "mobile_banner"
            widget: "image"
            hint: "Banner que aparece no celular. Tamanho recomendado: 1080x1920 px (formato retrato)."
