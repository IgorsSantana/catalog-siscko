<!doctype html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Siscko | Painel Administrativo</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="admin.css">
    
    <!-- Netlify Identity Widget -->
    <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
</head>
<body>
    
    <!-- Login Screen -->
    <div id="login-screen" class="login-screen">
        <div class="login-card">
            <img src="/logo-white.png" alt="Siscko Logo" class="login-logo">
            <h2>Área Restrita</h2>
            <p>Faça login para gerenciar o catálogo da Siscko.</p>
            <button id="btn-login" class="btn-primary">Entrar com Netlify</button>
        </div>
    </div>

    <!-- Admin App (Hidden until logged in) -->
    <div id="admin-app" class="admin-app" style="display: none;">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <img src="/logo-white.png" alt="Siscko Logo" class="sidebar-logo">
            </div>
            <nav class="sidebar-nav">
                <button class="nav-item active" data-tab="products">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20.38 3.46 16 2a8.59 8.59 0 0 0-2.92 0L8.62 3.46A2 2 0 0 0 7 5.38v7.24A2 2 0 0 0 8.62 14.54L13 16a8.59 8.59 0 0 0 2.92 0l4.46-1.46A2 2 0 0 0 22 12.62V5.38a2 2 0 0 0-1.62-1.92Z"/><path d="M12 22v-6"/></svg>
                    Catálogo
                </button>
                <button class="nav-item" data-tab="lookbook">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="18" height="18" x="3" y="3" rx="2" ry="2"/><circle cx="9" cy="9" r="2"/><path d="m21 15-3.086-3.086a2 2 0 0 0-2.828 0L6 21"/></svg>
                    Lookbook
                </button>
                <button class="nav-item" data-tab="settings">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/></svg>
                    Configurações
                </button>
            </nav>
            <div class="sidebar-footer">
                <button id="btn-logout" class="nav-item">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" x2="9" y1="12" y2="12"/></svg>
                    Sair
                </button>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <header class="topbar">
                <h1 id="page-title">Catálogo de Produtos</h1>
                <div class="topbar-actions">
                    <span id="save-status" class="status-text">Todas as alterações salvas</span>
                    <button id="btn-save" class="btn-primary" disabled>
                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
                        Salvar e Publicar
                    </button>
                </div>
            </header>

            <div class="content-scroll">
                <!-- Products Tab -->
                <div id="tab-products" class="tab-content active">
                    <div class="list-header">
                        <h2>Produtos</h2>
                        <button id="btn-add-product" class="btn-secondary">+ Novo Produto</button>
                    </div>
                    <div id="products-list" class="items-grid">
                        <!-- Products will be injected here via JS -->
                    </div>
                </div>

                <!-- Lookbook Tab -->
                <div id="tab-lookbook" class="tab-content">
                    <div class="list-header">
                        <h2>Galeria do Lookbook</h2>
                        <button id="btn-add-lookbook" class="btn-secondary">+ Adicionar Foto</button>
                    </div>
                    <div id="lookbook-list" class="gallery-grid">
                        <!-- Lookbook images will be injected here -->
                    </div>
                </div>

                <!-- Settings Tab -->
                <div id="tab-settings" class="tab-content">
                    <div class="form-group">
                        <label>Banners Desktop (Carrossel)</label>
                        <div id="settings-desktop-banners" class="gallery-grid">
                            <!-- Desktop banners injected here -->
                        </div>
                        <button id="btn-add-desktop-banner" class="btn-secondary mt-2">+ Adicionar Banner Desktop</button>
                    </div>
                    
                    <div class="form-group mt-4">
                        <label>Banner Mobile (Apenas 1)</label>
                        <div id="settings-mobile-banner" class="single-image-upload">
                            <!-- Mobile banner injected here -->
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Product Modal -->
    <div id="product-modal" class="modal-overlay" style="display: none;">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="modal-title">Editar Produto</h3>
                <button class="btn-close" id="btn-close-modal">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
                </button>
            </div>
            <div class="modal-body">
                <form id="product-form">
                    <input type="hidden" id="prod-id">
                    
                    <div class="form-row">
                        <div class="form-group toggle-group">
                            <label>Exibir no Site?</label>
                            <label class="switch">
                                <input type="checkbox" id="prod-active">
                                <span class="slider round"></span>
                            </label>
                        </div>
                    </div>
                    
                    <div class="form-group">
                        <label>Nome da Peça</label>
                        <input type="text" id="prod-name" placeholder="Ex: Moletom Chumbo" required>
                    </div>

                    <div class="form-row two-cols">
                        <div class="form-group">
                            <label>Preço (R$)</label>
                            <input type="number" id="prod-price" step="0.01" placeholder="99.90">
                        </div>
                        <div class="form-group">
                            <label>Status</label>
                            <select id="prod-status">
                                <option value="Disponível">Disponível</option>
                                <option value="Em Breve">Em Breve</option>
                                <option value="Esgotado">Esgotado</option>
                            </select>
                        </div>
                    </div>

                    <div class="form-group">
                        <label>Categoria (Sessão do Site)</label>
                        <select id="prod-category">
                            <option value="CLUB-01">CLUB-01</option>
                            <option value="EM BREVE">EM BREVE</option>
                        </select>
                    </div>

                    <div class="form-row two-cols">
                        <div class="form-group">
                            <label>Capa (Costas)</label>
                            <div class="image-upload" id="upload-main">
                                <img id="preview-main" src="" alt="" style="display:none;">
                                <div class="upload-placeholder">
                                    <span>Clique para enviar</span>
                                </div>
                                <input type="file" id="file-main" accept="image/*" style="display:none;">
                            </div>
                        </div>
                        <div class="form-group">
                            <label>Secundária (Frente/Hover)</label>
                            <div class="image-upload" id="upload-hover">
                                <img id="preview-hover" src="" alt="" style="display:none;">
                                <div class="upload-placeholder">
                                    <span>Clique para enviar</span>
                                </div>
                                <input type="file" id="file-hover" accept="image/*" style="display:none;">
                            </div>
                        </div>
                    </div>
                    
                    <div class="form-group mt-2">
                        <label>Galeria de Fotos Extras</label>
                        <div id="prod-extra-images" class="gallery-mini">
                            <!-- Extras injected here -->
                        </div>
                        <button type="button" id="btn-add-extra" class="btn-secondary btn-sm mt-2">+ Adicionar Foto Extra</button>
                        <input type="file" id="file-extra" accept="image/*" style="display:none;">
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button type="button" id="btn-delete-product" class="btn-danger">Excluir</button>
                <div>
                    <button type="button" class="btn-secondary mr-2" id="btn-cancel-modal">Cancelar</button>
                    <button type="button" class="btn-primary" id="btn-save-modal">Concluir Edição</button>
                </div>
            </div>
        </div>
    </div>
    
    <!-- Loading Overlay for Saves -->
    <div id="loading-overlay" class="modal-overlay" style="display: none; justify-content: center; align-items: center; z-index: 9999;">
        <div class="loading-spinner"></div>
        <p style="color: white; margin-top: 20px; font-weight: 600;">Salvando e publicando no site...</p>
    </div>

    <script src="admin.js"></script>
</body>
</html>
